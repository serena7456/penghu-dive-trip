function getWeatherInfo(c){return WEATHER_ICONS[c]||{icon:"🌡️",label:"—"};}

function useWeather(lat,lng){
  const[w,setW]=useState(null);const[l,setL]=useState(true);
  useEffect(()=>{let c=false;(async()=>{try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,apparent_temperature&daily=temperature_2m_max,temperature_2m_min,weather_code,uv_index_max,precipitation_probability_max&timezone=Asia/Taipei&forecast_days=16`);if(!r.ok)throw 0;const d=await r.json();if(!c){setW(d);setL(false);}}catch{if(!c)setL(false);}})();return()=>{c=true;};},[lat,lng]);
  return{weather:w,loading:l};
}

    <div style={{position:"absolute",top:40,left:20,fontSize:24,opacity:0.15}}>🫧</div>
    <div style={{position:"absolute",top:80,right:30,fontSize:20,opacity:0.12}}>🐠</div>
    <div style={{position:"absolute",bottom:50,left:50,fontSize:22,opacity:0.1}}>🐢</div>
    <div style={{fontSize:48,marginBottom:8}}>{trip.hero.emoji}</div>
    <div style={{display:"inline-block",background:"rgba(255,255,255,0.15)",backdropFilter:"blur(8px)",borderRadius:20,padding:"4px 16px",fontSize:13,color:"#fff",letterSpacing:1,marginBottom:10}}>🌊 {trip.title}</div>
    <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginBottom:6,letterSpacing:2}}>📅 {trip.dateRange}</div>
    <h1 style={{fontSize:24,fontWeight:800,color:"#fff",margin:"10px 0 6px",lineHeight:1.3}}>{trip.subtitle}</h1>
    <p style={{fontSize:14,color:"rgba(255,255,255,0.88)",margin:"0 0 20px",lineHeight:1.6}}>{trip.tagline}</p>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
      {trip.info.map((item,i)=>(<div key={i} style={{background:"rgba(255,255,255,0.15)",backdropFilter:"blur(8px)",borderRadius:12,padding:"8px 14px",fontSize:13,color:"#fff",fontWeight:500}}>{item.icon} {item.text}</div>))}
    </div>
    {trip.hero.greeting&&<div style={{marginTop:18,fontSize:14,color:"rgba(255,255,255,0.9)",fontWeight:600}}>{trip.hero.greeting}</div>}
  </div>
);}

function WeatherWidget({trip,theme}){const{weather,loading}=useWeather(trip.location.lat,trip.location.lng);if(!weather&&!loading)return null;return(
  <div style={{padding:"12px 20px 4px"}}>
    <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 10px"}}>🌤️ {trip.location.name} 即時天氣</h3>
    {loading?(<div style={{background:theme.card,borderRadius:14,padding:"18px",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}><div style={{fontSize:13,color:theme.textLight}}>⏳ 載入中...</div></div>
    ):weather?(<div style={{display:"flex",flexDirection:"column",gap:10}}>
      {weather.current&&(<div style={{background:theme.heroGradient,borderRadius:14,padding:"16px 18px",color:"#fff",display:"flex",alignItems:"center",gap:16}}>
        <div style={{fontSize:42}}>{getWeatherInfo(weather.current.weather_code).icon}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,opacity:0.75,marginBottom:2}}>NOW・{trip.location.name}</div>
          <div style={{fontSize:32,fontWeight:800,lineHeight:1.1}}>{Math.round(weather.current.temperature_2m)}°C</div>
          <div style={{fontSize:11,opacity:0.8,marginTop:3}}>體感 {Math.round(weather.current.apparent_temperature)}°C｜💨 {Math.round(weather.current.wind_speed_10m)} km/h｜💧 {weather.current.relative_humidity_2m}%</div>
        </div>
      </div>)}
      {weather.daily&&(<div style={{display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:4}}>
        {weather.daily.time.slice(0,7).map((date,i)=>{const wi=getWeatherInfo(weather.daily.weather_code[i]);const isToday=i===0;return(
          <div key={i} style={{flex:"0 0 auto",minWidth:70,background:isToday?theme.primaryLight:theme.card,borderRadius:12,padding:"10px 8px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.04)",border:isToday?`2px solid ${theme.primary}`:"1px solid rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:11,color:theme.textLight,marginBottom:3,fontWeight:isToday?700:400}}>{isToday?"今天":date.slice(5)}</div>
            <div style={{fontSize:22,marginBottom:2}}>{wi.icon}</div>
            <div style={{fontSize:10,color:theme.textLight,marginBottom:2}}>{wi.label}</div>
            <div style={{fontSize:12,fontWeight:700,color:theme.text}}><span style={{color:theme.accent}}>{Math.round(weather.daily.temperature_2m_max[i])}°</span><span style={{color:theme.textLight}}>/</span><span style={{color:theme.primary}}>{Math.round(weather.daily.temperature_2m_min[i])}°</span></div>
            {weather.daily.precipitation_probability_max&&(<div style={{fontSize:10,color:weather.daily.precipitation_probability_max[i]>=50?"#e53e3e":theme.textLight,marginTop:2}}>🌧 {weather.daily.precipitation_probability_max[i]}%</div>)}
          </div>);})}
      </div>)}
      <div style={{fontSize:10,color:theme.textLight,textAlign:"right"}}>資料來源：Open-Meteo・即時更新</div>
    </div>):null}
  </div>
);}

function FeeSection({fees,theme}){if(!fees)return null;return(
  <div style={{padding:"8px 20px 8px"}}>
    <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 10px"}}>💰 費用明細</h3>
    <div style={{display:"flex",gap:10,flexDirection:"column"}}>
      <div style={{background:"#e8f5e9",borderRadius:14,padding:"14px 16px",border:"1px solid #c8e6c9"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#2e7d32",marginBottom:8}}>✅ 費用包含</div>
        {fees.included.map((item,i)=>(<div key={i} style={{fontSize:13,color:theme.text,lineHeight:1.7,paddingLeft:4}}>• {item}</div>))}
      </div>
      <div style={{background:"#fce4ec",borderRadius:14,padding:"14px 16px",border:"1px solid #f8bbd0"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#c62828",marginBottom:8}}>❎ 費用不含</div>
        {fees.excluded.map((item,i)=>(<div key={i} style={{fontSize:13,color:theme.text,lineHeight:1.7,paddingLeft:4}}>• {item}</div>))}
      </div>
    </div>
  </div>
);}

function QualificationSection({qualification,theme}){if(!qualification)return null;return(
  <div style={{padding:"8px 20px 12px"}}>
    <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 10px"}}>‼️ {qualification.title}</h3>
    <div style={{background:theme.accentLight,borderRadius:14,padding:"14px 16px",border:`1px solid ${theme.accent}30`}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {qualification.items.map((item,i)=>(<div key={i} style={{fontSize:13,color:theme.text,lineHeight:1.5}}>{item.icon} {item.text}</div>))}
      </div>
      {qualification.note&&(<div style={{fontSize:12,color:theme.textLight,marginTop:10,paddingTop:10,borderTop:`1px solid ${theme.accent}20`,fontStyle:"italic"}}>📋 {qualification.note}</div>)}
    </div>
  </div>
);}

function DayTabs({days,activeDay,onChange,theme}){return(
  <div style={{display:"flex",gap:0,padding:"16px 16px 0",overflowX:"auto"}}>
    {days.map((day,i)=>{const a=i===activeDay;return(
      <button key={i} onClick={()=>onChange(i)} style={{flex:"1 0 auto",minWidth:80,padding:"12px 8px 10px",border:"none",borderBottom:a?`3px solid ${theme.accent}`:"3px solid transparent",background:a?theme.accentLight:"transparent",borderRadius:"12px 12px 0 0",cursor:"pointer",transition:"all 0.25s",textAlign:"center"}}>
        <div style={{fontSize:11,fontWeight:700,color:a?theme.accent:theme.textLight,letterSpacing:1}}>{day.label}</div>
        <div style={{fontSize:12,color:a?theme.text:theme.textLight,marginTop:2}}>{day.date.split("（")[0]}</div>
        {day.diveCount&&<div style={{fontSize:10,color:a?theme.primary:theme.textLight,marginTop:2}}>🤿 ×{day.diveCount}</div>}
      </button>);})}
  </div>
);}

function DayHeader({day,theme}){return(
  <div style={{padding:"24px 20px 12px"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
      <span style={{background:theme.accent,color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:8}}>{day.label}</span>
      <span style={{fontSize:13,color:theme.textLight}}>{day.date}</span>
    </div>
    <h2 style={{fontSize:22,fontWeight:800,color:theme.text,margin:"8px 0 4px"}}>{day.title}</h2>
    <p style={{fontSize:14,color:theme.textLight,margin:0,lineHeight:1.5}}>{day.subtitle}</p>
    {day.stats&&(<div style={{display:"flex",gap:8,marginTop:16}}>
      {day.stats.map((s,i)=>(<div key={i} style={{flex:1,background:theme.primaryLight,borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
        <div style={{fontSize:16,marginBottom:2}}>{s.icon}</div>
        <div style={{fontSize:15,fontWeight:700,color:theme.primary}}>{s.value}</div>
        <div style={{fontSize:11,color:theme.textLight,marginTop:2}}>{s.label}</div>
      </div>))}
    </div>)}
  </div>
);}

function MapSection({day,theme}){
  const locs=day.schedule.filter(s=>s.coords);if(locs.length===0)return null;
  const u=[];const seen=new Set();locs.forEach(l=>{const k=`${l.coords.lat},${l.coords.lng}`;if(!seen.has(k)){seen.add(k);u.push(l);}});
  const c=day.mapCenter||{lat:u.reduce((s,l)=>s+l.coords.lat,0)/u.length,lng:u.reduce((s,l)=>s+l.coords.lng,0)/u.length,zoom:10};
  const mapsUrl=`https://www.google.com/maps/dir/${u.map(l=>`${l.coords.lat},${l.coords.lng}`).join("/")}/`;
  const embedUrl=`https://maps.google.com/maps?q=${c.lat},${c.lng}&z=${c.zoom}&output=embed`;
  return(
    <div style={{padding:"8px 20px 16px"}}>
      <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 12px"}}>🗺️ 今日路線導覽</h3>
      <div style={{borderRadius:14,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.08)",marginBottom:12,border:"1px solid rgba(0,0,0,0.06)"}}>
        <iframe src={embedUrl} width="100%" height="200" style={{border:0,display:"block"}} allowFullScreen loading="lazy" title={`${day.label} map`}/>
      </div>
      <div style={{background:theme.card,borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.05)",border:"1px solid rgba(0,0,0,0.04)"}}>
        <div style={{fontSize:13,fontWeight:600,color:theme.text,marginBottom:10}}>📍 路線順序</div>
        {u.map((loc,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:28,flexShrink:0}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:theme.primary,color:"#fff",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
            {i<u.length-1&&<div style={{width:2,height:16,background:`${theme.primary}30`}}/>}
          </div>
          <div style={{flex:1,paddingBottom:i<u.length-1?2:0}}><span style={{fontSize:14}}>{loc.icon} </span><span style={{fontSize:13,color:theme.text}}>{loc.title}</span></div>
        </div>))}
        <a href={mapsUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:14,padding:"10px 16px",background:theme.primary,color:"#fff",borderRadius:10,textDecoration:"none",fontSize:13,fontWeight:600}}>🗺️ 在 Google Maps 開啟完整路線</a>
      </div>
    </div>
  );
}

function Timeline({schedule,theme}){return(
  <div style={{padding:"8px 20px 16px"}}>
    <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 16px"}}>📋 當日行程</h3>
    <div style={{position:"relative"}}>
      <div style={{position:"absolute",left:44,top:8,bottom:8,width:2,background:`linear-gradient(to bottom, ${theme.primary}22, ${theme.primary}44, ${theme.primary}22)`,borderRadius:1}}/>
      {schedule.map((item,i)=>{const ts=TAG_COLORS[item.tag]||{bg:"#f5f5f5",text:"#666"};const isDive=item.tag==="潛水";return(
        <div key={i} style={{display:"flex",gap:14,marginBottom:i<schedule.length-1?4:0,position:"relative",alignItems:"flex-start"}}>
          <div style={{width:36,fontSize:12,fontWeight:700,color:theme.primary,paddingTop:14,textAlign:"right",fontVariantNumeric:"tabular-nums",flexShrink:0}}>{item.time}</div>
          <div style={{width:14,height:14,borderRadius:"50%",background:isDive?theme.primary:theme.card,border:`3px solid ${theme.primary}`,flexShrink:0,marginTop:14,position:"relative",zIndex:1}}/>
          <div style={{flex:1,background:isDive?theme.primaryLight:theme.card,borderRadius:14,padding:"12px 14px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:isDive?`2px solid ${theme.primary}30`:"1px solid rgba(0,0,0,0.04)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
              <span style={{fontSize:18}}>{item.icon}</span>
              <span style={{fontSize:14,fontWeight:700,color:theme.text}}>{item.title}</span>
              {item.tag&&<span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:6,background:ts.bg,color:ts.text}}>{item.tag}</span>}
            </div>
            <p style={{fontSize:13,color:theme.textLight,margin:0,lineHeight:1.5}}>{item.desc}</p>
          </div>
        </div>);})}
    </div>
  </div>
);}

function FoodSection({food,theme}){if(!food||!food.length)return null;return(
  <div style={{padding:"8px 20px 16px"}}>
    <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 12px"}}>🍽️ 今日餐食</h3>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {food.map((item,i)=>(<div key={i} style={{background:theme.card,borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.05)",border:"1px solid rgba(0,0,0,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
        <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:theme.text,marginBottom:3}}>{item.name}</div><div style={{fontSize:13,color:theme.textLight,lineHeight:1.4}}>{item.desc}</div></div>
        <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:13,fontWeight:600,color:theme.accent}}>{item.price}</div><div style={{fontSize:11,color:theme.textLight}}>{item.rating}</div></div>
      </div>))}
    </div>
  </div>
);}

function TipsSection({tips,theme}){if(!tips||!tips.length)return null;return(
  <div style={{padding:"8px 20px 20px"}}>
    <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 12px"}}>💡 行程小 TIPS</h3>
    <div style={{background:theme.primaryLight,borderRadius:14,padding:"14px 16px",border:`1px solid ${theme.primary}20`}}>
      {tips.map((tip,i)=>(<div key={i} style={{fontSize:13,color:theme.text,lineHeight:1.6,marginBottom:i<tips.length-1?8:0,paddingBottom:i<tips.length-1?8:0,borderBottom:i<tips.length-1?`1px solid ${theme.primary}15`:"none"}}>{tip}</div>))}
    </div>
  </div>
);}

function PackingList({items,theme}){if(!items||!items.length)return null;return(
  <div style={{padding:"8px 20px 20px"}}>
    <h3 style={{fontSize:16,fontWeight:700,color:theme.text,margin:"0 0 12px"}}>🧳 裝備 & 行李清單</h3>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      {items.map((item,i)=>(<div key={i} style={{background:theme.card,borderRadius:10,padding:"10px 12px",fontSize:13,color:theme.text,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",border:"1px solid rgba(0,0,0,0.04)"}}>{item.icon} {item.text}</div>))}
    </div>
  </div>
);}

function Closing({closing,theme}){if(!closing)return null;return(
  <div style={{padding:"8px 20px 32px"}}>
    <div style={{background:theme.heroGradient,borderRadius:18,padding:"24px 20px",textAlign:"center"}}>
      <h3 style={{fontSize:18,fontWeight:700,color:"#fff",margin:"0 0 10px"}}>{closing.title}</h3>
      <p style={{fontSize:14,color:"rgba(255,255,255,0.9)",margin:"0 0 16px",lineHeight:1.7}}>{closing.message}</p>
      <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{closing.signoff}</div>
    </div>
  </div>
);}

function App(){
  const[activeDay,setActiveDay]=useState(0);
  const trip=TRIP;const t=trip.theme;const currentDay=trip.days[activeDay];
  return(
    <div style={{maxWidth:480,margin:"0 auto",background:t.bg,minHeight:"100vh",fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif'}}>
      <Hero trip={trip}/>
      <WeatherWidget trip={trip} theme={t}/>
      <FeeSection fees={trip.fees} theme={t}/>
      <QualificationSection qualification={trip.qualification} theme={t}/>
      <DayTabs days={trip.days} activeDay={activeDay} onChange={setActiveDay} theme={t}/>
      <div style={{height:1,background:`linear-gradient(to right, transparent, ${t.primary}20, transparent)`,margin:"0 20px"}}/>
      <DayHeader day={currentDay} theme={t}/>
      <MapSection day={currentDay} theme={t}/>
      <Timeline schedule={currentDay.schedule} theme={t}/>
      <FoodSection food={currentDay.food} theme={t}/>
      <TipsSection tips={currentDay.tips} theme={t}/>
      {activeDay===0&&<PackingList items={trip.packingList} theme={t}/>}
      {trip.diveNote&&(
        <div style={{padding:"4px 20px 12px"}}>
          <div style={{background:`${t.accent}12`,border:`1px solid ${t.accent}30`,borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"flex-start"}}>
            <span style={{fontSize:18,flexShrink:0,lineHeight:1.3}}>🌊</span>
            <p style={{fontSize:13,color:t.text,margin:0,lineHeight:1.6}}>{trip.diveNote}</p>
          </div>
        </div>
      )}
      {(activeDay===0||activeDay===trip.days.length-1)&&<Closing closing={trip.closing} theme={t}/>}
      <div style={{textAlign:"center",padding:"16px 20px 32px"}}>
        <div style={{fontSize:11,color:t.textLight}}>✨ Made with Cho-Agent · Travel Itinerary Template</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
