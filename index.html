<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;background:#f0f4f8}
button{font-family:inherit;cursor:pointer}

.wrap{max-width:480px;margin:0 auto;min-height:100vh;background:#f0f4f8}

.hero-emoji{font-size:48px;margin-bottom:8px}
.hero-badge{display:inline-block;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:20px;padding:4px 16px;font-size:13px;letter-spacing:1px;margin-bottom:10px}
.hero-date{font-size:12px;opacity:.8;letter-spacing:2px;margin-bottom:6px}
.hero h1{font-size:24px;font-weight:800;margin:10px 0 6px;line-height:1.3}
.hero-tagline{font-size:14px;opacity:.88;margin:0 0 20px;line-height:1.6}
.hero-info{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.hero-info span{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:12px;padding:8px 14px;font-size:13px;font-weight:500}
.hero-greeting{margin-top:18px;font-size:14px;font-weight:600;opacity:.9}

/* Sections */
.sec{padding:8px 20px 16px}
.sec h3{font-size:16px;font-weight:700;color:#1a1a2e;margin:0 0 12px}

@media(min-width:1024px){.sec{padding:12px 36px 20px}.sec h3{font-size:18px}}

.card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.04)}

@media(min-width:1024px){.card{padding:18px 24px}}

.wx-now{background:linear-gradient(135deg,#0c2461 0%,#1e3799 30%,#0984e3 65%,#00cec9 100%);border-radius:14px;padding:16px 18px;color:#fff;display:flex;align-items:center;gap:16px}
.wx-now .icon{font-size:42px}
.wx-now .temp{font-size:32px;font-weight:800;line-height:1.1}
.wx-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.wx-day{flex:0 0 auto;min-width:70px;background:#fff;border-radius:12px;padding:10px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04)}
.wx-day.today{background:#e8eef8;border:2px solid #0c2461}

.fee-row{display:flex;gap:10px;flex-direction:column}

.fee-row>div{flex:1;border-radius:14px;padding:14px 16px}
.fee-inc{background:#e8f5e9;border:1px solid #c8e6c9}
.fee-exc{background:#fce4ec;border:1px solid #f8bbd0}

/* Qual */
.qual-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Tabs */
.tabs{display:flex;padding:16px 16px 0;overflow-x:auto}
.tab{flex:1 0 auto;min-width:80px;padding:12px 8px 10px;border:none;border-bottom:3px solid transparent;background:transparent;border-radius:12px 12px 0 0;text-align:center;transition:all .25s}
.tab.active{border-bottom-color:#e67e22;background:#fef4e8}
.tab-label{font-size:11px;font-weight:700;letter-spacing:1px;color:#5a6a7a}
.tab.active .tab-label{color:#e67e22}
.tab-date{font-size:12px;color:#5a6a7a;margin-top:2px}
.tab.active .tab-date{color:#1a1a2e}
.tab-dive{font-size:10px;color:#5a6a7a;margin-top:2px}
.tab.active .tab-dive{color:#0c2461}

/* Day header */
.day-badge{background:#e67e22;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;display:inline-block}
.day-title{font-size:22px;font-weight:800;color:#1a1a2e;margin:8px 0 4px}
.day-sub{font-size:14px;color:#5a6a7a;line-height:1.5}
@media(min-width:640px){.day-title{font-size:26px}.day-sub{font-size:15px}}
@media(min-width:1024px){.day-title{font-size:30px}.day-sub{font-size:16px}}
.stats{display:flex;gap:8px;margin-top:16px}
.stat{flex:1;background:#e8eef8;border-radius:12px;padding:10px 12px;text-align:center}
.stat-icon{font-size:16px;margin-bottom:2px}
.stat-val{font-size:15px;font-weight:700;color:#0c2461}
.stat-lbl{font-size:11px;color:#5a6a7a;margin-top:2px}
@media(min-width:1024px){.stat{padding:14px 20px}.stat-icon{font-size:22px}.stat-val{font-size:20px}.stat-lbl{font-size:13px}}

.map-wrap{display:block}
@media(min-width:1024px){.map-wrap{display:flex;gap:16px}}
.map-iframe{border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:12px;border:1px solid rgba(0,0,0,.06)}

.map-route{flex:.8}
.route-num{width:24px;height:24px;border-radius:50%;background:#0c2461;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.route-line{width:2px;height:16px;background:rgba(12,36,97,.2);margin:0 auto}
.map-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:10px 16px;background:#0c2461;color:#fff;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600}

.tl-title{font-size:14px;font-weight:700;color:#1a1a2e}

.tl-desc{font-size:13px;color:#5a6a7a;margin-top:4px;line-height:1.5}

.food-desc{font-size:13px;color:#5a6a7a;line-height:1.4}
.food-price{font-size:13px;font-weight:600;color:#e67e22;text-align:right}

@media(min-width:1024px){.pack-grid{grid-template-columns:1fr 1fr 1fr 1fr}}

.dive-note{background:rgba(230,126,34,.07);border:1px solid rgba(230,126,34,.2);border-radius:12px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start}

.safety-toggle{width:100%;background:#fff;border:1px solid rgba(12,36,97,.15);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.safety-arrow{font-size:18px;color:#0c2461;transition:transform .3s;display:inline-block}
.safety-body{margin-top:10px;background:#fff;border-radius:14px;border:1px solid rgba(12,36,97,.08);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}

.safety-items{padding:0 16px 14px}

.safety-item+.safety-item{margin-top:6px;padding-top:6px;border-top:1px solid rgba(12,36,97,.04)}

.closing{background:linear-gradient(135deg,#0c2461 0%,#1e3799 30%,#0984e3 65%,#00cec9 100%);border-radius:18px;padding:24px 20px;text-align:center;color:#fff}
.closing h3{font-size:18px;font-weight:700;margin:0 0 10px}
.closing p{font-size:14px;opacity:.9;margin:0 0 16px;line-height:1.7}
.closing .signoff{font-size:16px;font-weight:700}

.footer{text-align:center;padding:16px 20px 32px;font-size:11px;color:#5a6a7a}
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(12,36,97,.12),transparent);margin:0 20px}
.hidden{display:none}
</style>
</head>

  day.schedule.forEach((item,i)=>{
    const tc=TC[item.tag]||{b:"#f5f5f5",t:"#666"};const isDive=item.tag==="潛水";
    dc+=`<div class="tl-item"><div class="tl-time">${item.time}</div><div class="tl-dot${isDive?" dive":""}"></div><div class="tl-card${isDive?" dive":""}"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap"><span class="tl-icon">${item.icon}</span><span class="tl-title">${item.title}</span>${item.tag?`<span class="tag" style="background:${tc.b};color:${tc.t}">${item.tag}</span>`:""}</div><p class="tl-desc">${item.desc}</p></div></div>`;
  });
  dc+=`</div></div>`;

  // Food
  if(day.food&&day.food.length){
    dc+=`<div class="sec"><h3>🍽️ 今日餐食</h3><div style="display:flex;flex-direction:column;gap:10px">`;
    day.food.forEach(f=>{dc+=`<div class="card food-card"><div style="flex:1"><div class="food-name">${f.name}</div><div class="food-desc">${f.desc}</div></div><div style="text-align:right;flex-shrink:0"><div class="food-price">${f.price}</div><div class="food-rating">${f.rating}</div></div></div>`;});
    dc+=`</div></div>`;
  }

  // Tips
  if(day.tips&&day.tips.length){
    dc+=`<div class="sec"><h3>💡 行程小 TIPS</h3><div class="tips-box">${day.tips.map(t=>`<div class="tip-item">${t}</div>`).join("")}</div></div>`;
  }

  // Packing (day 1 only)
  if(activeDay===0){
    dc+=`<div class="sec"><h3>🧳 裝備 & 行李清單</h3><div class="pack-grid">${T.packingList.map(p=>`<div class="pack-item">${p.icon} ${p.text}</div>`).join("")}</div>`;
    if(T.packingNote&&T.packingNote.length){
      dc+=`<div class="tips-box" style="margin-top:10px;background:#fef4e8;border-color:rgba(230,126,34,.2)"><div style="font-size:13px;font-weight:700;color:#e67e22;margin-bottom:6px">📌 船上空間有限，小提醒</div>${T.packingNote.map(n=>`<div class="tip-item" style="color:#1a1a2e">${n}</div>`).join("")}</div>`;
    }
    dc+=`</div>`;
  }

  // Dive note
  dc+=`<div class="sec"><div class="dive-note"><span style="font-size:18px;flex-shrink:0;line-height:1.3">🌊</span><p>${T.diveNote}</p></div></div>`;

  // Dive safety
  dc+=`<div class="sec" id="safety-sec"><button class="safety-toggle" id="safety-btn"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">⚠️</span><div style="text-align:left"><div style="font-size:16px;font-weight:700;color:#1a1a2e">${T.diveSafety.title}</div><div style="font-size:12px;color:#5a6a7a;margin-top:2px" id="safety-hint">點擊展開完整注意事項</div></div></div><span class="safety-arrow" id="safety-arrow">▼</span></button><div class="safety-body hidden" id="safety-body"><div class="safety-intro">📋 ${T.diveSafety.intro}</div>`;
  T.diveSafety.sections.forEach((sec,idx)=>{
    dc+=`<div class="safety-sec"><button class="safety-sec-toggle" data-sec="${idx}"><span>${sec.title}</span><span class="safety-sec-arrow" id="sec-arrow-${idx}">▼</span></button><div class="safety-items" id="sec-items-${idx}">${sec.items.map(it=>`<div class="safety-item">${it}</div>`).join("")}</div></div>`;
  });
  dc+=`</div></div>`;

  // Closing
  if(activeDay===0||activeDay===T.days.length-1){
    dc+=`<div class="sec"><div class="closing"><h3>${T.closing.title}</h3><p>${T.closing.message}</p><div class="signoff">${T.closing.signoff}</div></div></div>`;
  }

  dc+=`</div><div class="footer">✨ Made with Cho-Agent · Travel Itinerary Template</div>`;
  app.innerHTML+=dc;

  // Event: tabs
  document.querySelectorAll(".tab").forEach(btn=>{
    btn.addEventListener("click",()=>{activeDay=parseInt(btn.dataset.day);render();});
  });

  // Event: safety toggle
  const safetyBtn=$("safety-btn"),safetyBody=$("safety-body"),safetyArrow=$("safety-arrow"),safetyHint=$("safety-hint");
  if(safetyBtn){safetyBtn.addEventListener("click",()=>{
    const open=safetyBody.classList.toggle("hidden");
    safetyArrow.style.transform=open?"rotate(0deg)":"rotate(180deg)";
    safetyHint.textContent=open?"點擊展開完整注意事項":"點擊收合";
  });}

  // Event: safety sub-sections
  document.querySelectorAll(".safety-sec-toggle").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const idx=btn.dataset.sec,items=$("sec-items-"+idx),arrow=$("sec-arrow-"+idx);
      const isHidden=items.classList.toggle("hidden");
      arrow.style.transform=isHidden?"rotate(-90deg)":"rotate(0deg)";
    });
  });
}

render();
</script>
</body>
</html>
